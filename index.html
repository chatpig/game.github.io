<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="https://gguf.us/logo.png" />
<title>game</title>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#111;font-family:'Courier New',monospace}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}

#settings-btn{position:absolute;top:12px;right:12px;width:40px;height:40px;background:rgba(0,0,0,.7);border:2px solid #666;border-radius:8px;color:#fff;font-size:20px;cursor:pointer;pointer-events:all;display:flex;align-items:center;justify-content:center;z-index:50}
#settings-btn:hover{background:rgba(80,80,80,.9)}
#mode-btn{position:absolute;top:12px;right:108px;height:40px;background:rgba(0,0,0,.7);border:2px solid #666;border-radius:8px;color:#fff;font-size:11px;cursor:pointer;pointer-events:all;display:flex;align-items:center;justify-content:center;z-index:50;font-family:monospace;padding:0 12px;letter-spacing:1px}
#mode-btn:hover{background:rgba(80,80,80,.9)}
#mode-btn.active{background:rgba(45,70,110,.9);border-color:#6a8acc;color:#cfe0ff}
.three-canvas{position:absolute;inset:0;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges}

#settings-panel{position:absolute;top:60px;right:12px;width:280px;background:rgba(15,15,35,.97);border:2px solid #556;border-radius:10px;padding:16px;color:#eee;pointer-events:all;z-index:100}
#settings-panel h3{margin:0 0 10px;color:#99aaff;font-size:13px;letter-spacing:2px;text-transform:uppercase}
#settings-panel label{display:block;font-size:10px;color:#99a;margin:10px 0 3px;text-transform:uppercase;letter-spacing:1px}
#settings-panel input{width:100%;box-sizing:border-box;background:#0a0a1a;border:1px solid #445;border-radius:4px;color:#eef;padding:5px 8px;font-size:12px;font-family:monospace;outline:none}
#settings-panel input:focus{border-color:#667}
.toggle-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:12px}
.toggle-btn{padding:3px 14px;border-radius:4px;border:1px solid #556;cursor:pointer;font-size:11px;font-family:monospace;pointer-events:all}
.toggle-btn.on{background:#2a6a2a;color:#afa;border-color:#4a9a4a}
.toggle-btn.off{background:#2a2a2a;color:#888;border-color:#444}

#dialog-box{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);width:min(680px,90vw);background:rgba(8,8,25,.97);border:2px solid #446;border-radius:12px;padding:14px;color:#eee;pointer-events:all;z-index:200;display:flex;flex-direction:column;gap:8px}
#dialog-header{display:flex;justify-content:space-between;align-items:center}
#dialog-header h3{margin:0;color:#88aaff;font-size:13px;letter-spacing:2px;text-transform:uppercase}
#dialog-close{background:none;border:1px solid #445;border-radius:4px;color:#888;cursor:pointer;padding:2px 10px;font-size:11px;font-family:monospace}
#dialog-close:hover{color:#ccc;border-color:#667}
#dialog-history{overflow-y:auto;min-height:70px;max-height:240px;padding:8px;background:rgba(0,0,0,.4);border-radius:6px;font-size:12px;line-height:1.6;scroll-behavior:smooth}
.msg-user{color:#7bcfff;margin-bottom:8px}
.msg-ai{color:#ffd080;margin-bottom:8px}
.msg-sys{color:#888;margin-bottom:8px;font-style:italic}
.msg-err{color:#f88;margin-bottom:8px}
.msg-label{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
#image-preview{display:none;align-items:center;gap:8px;font-size:11px;color:#888}
#image-preview img{max-height:48px;border-radius:4px;border:1px solid #445}
#img-clear{background:none;border:none;color:#a55;cursor:pointer;font-size:11px;pointer-events:all}
#dialog-input-area{display:flex;gap:6px;align-items:flex-end}
#dialog-text{flex:1;background:#0a0a1a;border:1px solid #445;border-radius:6px;color:#eee;padding:7px 10px;font-size:12px;font-family:monospace;resize:none;min-height:38px;max-height:80px;outline:none}
#dialog-text:focus{border-color:#667}
#dialog-image-btn{background:#111828;border:1px solid #445;border-radius:6px;color:#88aaff;cursor:pointer;padding:7px 10px;font-size:16px;line-height:1}
#dialog-image-btn:hover{background:#1a2040}
#dialog-send{background:#2a4a8a;border:none;border-radius:6px;color:#fff;cursor:pointer;padding:7px 14px;font-size:12px;font-weight:bold;white-space:nowrap}
#dialog-send:hover:not(:disabled){background:#3a5aaa}
#dialog-send:disabled{background:#1a2a3a;color:#556;cursor:default}

#team-hud{position:absolute;top:12px;left:12px;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.team-card{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.65);border:1px solid #445;border-radius:6px;padding:4px 10px;font-size:11px;color:#ddd}
.team-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

#hint-bar{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.65);border:1px solid #445;border-radius:6px;padding:5px 14px;font-size:11px;color:#ccc;white-space:nowrap;pointer-events:none;transition:opacity .4s}

.hidden{display:none!important}

#editor-btn{position:absolute;top:12px;right:60px;width:40px;height:40px;background:rgba(0,0,0,.7);border:2px solid #666;border-radius:8px;color:#fff;font-size:18px;cursor:pointer;pointer-events:all;display:flex;align-items:center;justify-content:center;z-index:50}
#editor-btn:hover{background:rgba(80,80,80,.9)}
#editor-btn.active{background:rgba(40,80,40,.9);border-color:#4a9a4a}

#editor-panel{position:absolute;top:0;left:0;width:180px;height:100%;background:rgba(8,8,22,.96);border-right:2px solid #334;padding:10px 8px;box-sizing:border-box;overflow-y:auto;pointer-events:all;z-index:49;display:flex;flex-direction:column;gap:2px}
#editor-panel h3{margin:0 0 6px;color:#88cc88;font-size:11px;letter-spacing:2px;text-transform:uppercase}
.pal-section{font-size:9px;color:#556;text-transform:uppercase;letter-spacing:1px;margin:8px 0 2px;padding-top:6px;border-top:1px solid #223}
.pal-item{display:flex;align-items:center;gap:6px;padding:3px 6px;border-radius:4px;cursor:pointer;font-size:11px;color:#aab;border:1px solid transparent}
.pal-item:hover{background:rgba(255,255,255,.07);border-color:#334}
.pal-item.active{background:rgba(80,160,80,.2);border-color:#4a7a4a;color:#cec}
.pal-swatch{width:14px;height:14px;border-radius:2px;flex-shrink:0;border:1px solid rgba(255,255,255,.15)}
#editor-actions{margin-top:auto;padding-top:8px;border-top:1px solid #223;display:flex;flex-direction:column;gap:4px}
.ed-btn{padding:5px 8px;border-radius:4px;border:1px solid #334;background:#0d1220;color:#99aacc;font-size:10px;cursor:pointer;font-family:monospace;text-align:center;width:100%;box-sizing:border-box}
.ed-btn:hover{background:#162030;color:#bbddff}
.ed-btn.green{border-color:#3a6a3a;color:#8aca8a}.ed-btn.green:hover{background:#162816}
.ed-btn.red{border-color:#6a2a2a;color:#ca7a7a}.ed-btn.red:hover{background:#281616}
#editor-cursor-info{font-size:9px;color:#445;text-align:center;padding:2px 0}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <button id="settings-btn" title="Settings">&#9881;</button>
  <button id="mode-btn" title="Toggle 3D Mode">3D</button>
  <button id="editor-btn" title="Map Editor">&#9783;</button>
  <div id="editor-panel" class="hidden">
    <h3>&#9783; Map Editor</h3>
    <div id="pal-items"></div>
    <div id="editor-actions">
      <div id="editor-cursor-info">hover map to place</div>
      <button class="ed-btn green" id="editor-play">&#9654; Play Map</button>
      <button class="ed-btn" id="editor-save">&#128190; Save JSON</button>
      <label class="ed-btn" style="cursor:pointer">&#128194; Load JSON<input type="file" id="editor-load-input" accept=".json" style="display:none"></label>
      <button class="ed-btn red" id="editor-clear">&#128465; Clear All</button>
    </div>
  </div>
  <div id="settings-panel" class="hidden">
    <h3>&#9881; Settings</h3>
    <label>API Endpoint</label>
    <input type="text" id="cfg-endpoint" placeholder="http://127.0.0.1:8888/v1/chat/completions">
    <label>API Key (optional)</label>
    <input type="password" id="cfg-apikey" placeholder="sk-...">
    <label>Model Identifier</label>
    <input type="text" id="cfg-model" placeholder="local-model">
    <div class="toggle-row"><span>Background Music</span><button class="toggle-btn on" id="toggle-music">ON</button></div>
    <div class="toggle-row"><span>Sound Effects</span><button class="toggle-btn on" id="toggle-sfx">ON</button></div>
  </div>

  <div id="dialog-box" class="hidden">
    <div id="dialog-header">
      <h3>&#128508; GGUF Oracle</h3>
      <button id="dialog-close">&#x2715; Close</button>
    </div>
    <div id="dialog-history">
      <div class="msg-ai"><div class="msg-label">GGUF Oracle</div>Greetings, traveler. I am the GGUF Oracle, keeper of ancient wisdom. Ask me anything &#8212; I can even analyze images you share!</div>
    </div>
    <div id="image-preview"><img id="preview-img" src="" alt=""><span id="preview-name"></span><button id="img-clear">&#x2715; remove</button></div>
    <div id="dialog-input-area">
      <textarea id="dialog-text" placeholder="Ask the Oracle..." rows="2"></textarea>
      <button id="dialog-image-btn" title="Attach image">&#128247;</button>
      <button id="dialog-send">Send</button>
    </div>
    <input type="file" id="file-input" accept="image/*" style="display:none">
  </div>

  <div id="team-hud"></div>
  <div id="hint-bar">WASD / Arrows &#183; move &nbsp;&nbsp;|&nbsp;&nbsp; E &#183; interact</div>
</div>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const TILE = 32, WORLD_W = 80, WORLD_H = 80;
const WPX = WORLD_W * TILE, HPX = WORLD_H * TILE;
const CX = WORLD_W / 2, CY = WORLD_H / 2; // center tile coords
const SPRITE = 48, SPRITE_HALF = SPRITE * 0.75;

const T_GRASS = 0, T_PATH = 1, T_PLAZA = 2, T_WATER = 3, T_SOLID = 4;

const PAL = {
  grass:'#4a7a36', grassD:'#3c6a2c', path:'#484858', pathD:'#3c3c4c',
  plaza:'#909098', plazaD:'#808088', water:'#2a78b5', waterL:'#4a98d0',
  trunk:'#7a4f2a', treeL:'#3a8f3a', treeD:'#2a6a2a',
  shadow:'rgba(0,0,0,0.22)',
};

// ─── STATE ─────────────────────────────────────────────────────────────────────
const cfg = { endpoint:'http://127.0.0.1:8888/v1/chat/completions', apiKey:'', model:'local-model', music:true, sfx:true };
const cam = { x:0, y:0 };
const keys = {}, justPressed = {};
let interactTarget = null, dialogOpen = false, selectedImage = null;
let mode3D = false, threeDirty = true;
const dialogHistory = []; // for API calls

// ─── AUDIO ─────────────────────────────────────────────────────────────────────
const Aud = (() => {
  let ctx=null, mGain=null, sGain=null, playing=false, timer=null, idx=0;
  const MELODY=[261.63,293.66,329.63,392,349.23,329.63,293.66,261.63,392,440,392,349.23,329.63,261.63];

  function init(){
    if(ctx)return;
    ctx=new(window.AudioContext||window.webkitAudioContext)();
    mGain=ctx.createGain(); mGain.gain.value=0.1; mGain.connect(ctx.destination);
    sGain=ctx.createGain(); sGain.gain.value=0.28; sGain.connect(ctx.destination);
  }

  function note(freq,dur,type='sine',g=sGain){
    if(!ctx)return;
    const o=ctx.createOscillator(), gn=ctx.createGain();
    o.connect(gn); gn.connect(g);
    o.type=type; o.frequency.setValueAtTime(freq,ctx.currentTime);
    gn.gain.setValueAtTime(0,ctx.currentTime);
    gn.gain.linearRampToValueAtTime(.35,ctx.currentTime+.02);
    gn.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);
    o.start(ctx.currentTime); o.stop(ctx.currentTime+dur);
  }

  function tick(){
    if(!playing||!cfg.music)return;
    const f=MELODY[idx%MELODY.length]; idx++;
    note(f,.38,'triangle',mGain);
    if(idx%4===0) note(f*1.498,.3,'sine',mGain);
    timer=setTimeout(tick,420);
  }

  return {
    init,
    start(){ if(playing)return; playing=true; tick(); },
    stop(){ playing=false; if(timer)clearTimeout(timer); },
    sfx:{
      step(){ if(!cfg.sfx||!ctx)return; note(80+Math.random()*30,.06,'triangle'); },
      recruit(){ if(!cfg.sfx||!ctx)return; [523,659,784,1047].forEach((f,i)=>setTimeout(()=>note(f,.2,'sine'),i*100)); },
      open(){ if(!cfg.sfx||!ctx)return; [440,550,660].forEach((f,i)=>setTimeout(()=>note(f,.14,'sine'),i*70)); },
      close(){ if(!cfg.sfx||!ctx)return; [660,440,330].forEach((f,i)=>setTimeout(()=>note(f,.14,'sine'),i*60)); },
      send(){ if(!cfg.sfx||!ctx)return; note(880,.09,'sine'); },
      recv(){ if(!cfg.sfx||!ctx)return; [523,659,784,1047].forEach((f,i)=>setTimeout(()=>note(f,.14,'sine'),i*55)); },
    }
  };
})();

// ─── WORLD ─────────────────────────────────────────────────────────────────────
const tiles = new Uint8Array(WORLD_W * WORLD_H).fill(T_GRASS);
const decors = []; // {type,x,y,w?,h?,c?,c2?}

function setT(tx,ty,t){ if(tx>=0&&ty>=0&&tx<WORLD_W&&ty<WORLD_H) tiles[ty*WORLD_W+tx]=t; }
function getT(tx,ty){ if(tx<0||ty<0||tx>=WORLD_W||ty>=WORLD_H) return T_SOLID; return tiles[ty*WORLD_W+tx]; }

function buildWorld(){
  // City layout: pavement default, road grid, parks, buildings
  tiles.fill(T_PLAZA);
  decors.length=0;

  // Road grid – 3-wide roads at rows/cols 19-21, 39-41, 59-61
  const RH=[[19,21],[39,41],[59,61]], RV=[[19,21],[39,41],[59,61]];
  for(let y=0;y<WORLD_H;y++) for(let x=0;x<WORLD_W;x++){
    if(RH.some(([a,b])=>y>=a&&y<=b)||RV.some(([a,b])=>x>=a&&x<=b)) setT(x,y,T_PATH);
  }

  // 4×4 block grid: x/y ranges 0-18,22-38,42-58,62-79
  const BK=[[0,18],[22,38],[42,58],[62,79]];
  const PARKS=new Set(['1,1','2,2']); // central park & pond block
  const roofs=['#b04030','#3060b0','#4a2870','#205080','#208060','#806020','#208050','#502080','#703020','#307050'];
  const walls=['#c8cce0','#d0d4e8','#e0dcd8','#d8e0d8','#dce8e0','#e8e4d0','#d0e0e8','#e0d8e8','#d8d0e8','#e8d8d0'];
  let seed=42;
  const lcg=()=>{ seed=(seed*1664525+1013904223)>>>0; return seed/0xffffffff; };

  BK.forEach(([x0,x1],bxi)=> BK.forEach(([y0,y1],byi)=>{
    if(PARKS.has(`${bxi},${byi}`)) return;
    let curY=y0+1;
    while(curY+2<y1){
      const bh=2+Math.floor(lcg()*2);
      let curX=x0+1;
      while(curX+2<x1){
        const bw=2+Math.floor(lcg()*3);
        if(curX+bw>=x1) break;
        const ri=Math.floor(lcg()*roofs.length);
        decors.push({type:'building',x:curX*TILE,y:curY*TILE,w:bw*TILE,h:bh*TILE,c:walls[ri%walls.length],c2:roofs[ri%roofs.length]});
        for(let yy=curY;yy<curY+bh;yy++) for(let xx=curX;xx<curX+bw;xx++) setT(xx,yy,T_SOLID);
        curX+=bw+1;
      }
      curY+=bh+1;
    }
  }));

  // Central park (block 1,1: x=22-38, y=22-38)
  for(let y=22;y<=38;y++) for(let x=22;x<=38;x++) setT(x,y,T_GRASS);
  [[24,24],[36,24],[24,36],[36,36],[30,26],[27,32],[33,30]].forEach(([tx,ty])=>{
    decors.push({type:'tree',x:tx*TILE,y:ty*TILE}); setT(tx,ty,T_SOLID);
  });
  const flc=['#ff6699','#ffcc44','#aa66ff','#ff99aa','#88ffbb'];
  for(let i=0;i<50;i++){
    const tx=23+Math.floor(lcg()*15),ty=23+Math.floor(lcg()*15);
    if(getT(tx,ty)===T_GRASS) decors.push({type:'flower',x:tx*TILE+lcg()*TILE,y:ty*TILE+lcg()*TILE,c:flc[i%flc.length]});
  }

  // Pond block (block 2,2: x=42-58, y=42-58)
  for(let y=42;y<=58;y++) for(let x=42;x<=58;x++) setT(x,y,T_GRASS);
  for(let y=45;y<=55;y++) for(let x=45;x<=55;x++)
    if(Math.hypot(x-50,y-50)<5.5) setT(x,y,T_WATER);
  [[44,44],[56,44],[44,56],[56,56],[50,43]].forEach(([tx,ty])=>{
    if(getT(tx,ty)===T_GRASS){ decors.push({type:'tree',x:tx*TILE,y:ty*TILE}); setT(tx,ty,T_SOLID); }
  });
  for(let i=0;i<25;i++){
    const tx=43+Math.floor(lcg()*15),ty=43+Math.floor(lcg()*15);
    if(getT(tx,ty)===T_GRASS) decors.push({type:'flower',x:tx*TILE+lcg()*TILE,y:ty*TILE+lcg()*TILE,c:flc[i%flc.length]});
  }

  // Pre-placed city props
  const carPalette=[{c:'#cc3333',c2:'#aa2222'},{c:'#3355cc',c2:'#2244aa'},{c:'#338833',c2:'#226622'},{c:'#888',c2:'#666'},{c:'#cc8833',c2:'#aa6622'},{c:'#551177',c2:'#440055'}];
  [[23,18],[28,18],[33,18],[45,18],[50,18],[55,18],[23,40],[28,40],[45,40],[52,40],[19,24],[19,32],[19,45],[19,52]].forEach(([tx,ty],i)=>{
    const cc=carPalette[i%carPalette.length];
    decors.push({type:'car',x:tx*TILE,y:(ty-1)*TILE,w:TILE*2,h:44,c:cc.c,c2:cc.c2});
  });
  [[19,18],[22,19],[39,18],[42,19],[59,18],[62,19]].forEach(([tx,ty])=>decors.push({type:'traffic_light',x:tx*TILE,y:ty*TILE}));
  [[21,17],[21,23],[41,17],[41,23],[61,17],[61,23],[17,21],[23,21],[37,21],[43,21]].forEach(([tx,ty])=>decors.push({type:'fire_hydrant',x:tx*TILE,y:ty*TILE}));
  [[21,20],[21,38],[41,20],[41,38]].forEach(([tx,ty])=>decors.push({type:'culvert_cover',x:tx*TILE,y:ty*TILE}));
  // Crosswalks at intersections
  [[22,19],[22,39],[42,19],[42,39],[62,19],[62,39]].forEach(([tx,ty])=>decors.push({type:'crosswalk',x:tx*TILE,y:ty*TILE,dir:'v'}));
  [[19,22],[39,22],[59,22],[19,42],[39,42],[59,42]].forEach(([tx,ty])=>decors.push({type:'crosswalk',x:tx*TILE,y:ty*TILE,dir:'h'}));
  // A bus on east main road
  decors.push({type:'bus',x:62*TILE,y:28*TILE,w:TILE*4,h:60,c:'#eecc00'});
  // A truck on south road
  decors.push({type:'truck',x:26*TILE,y:59*TILE,w:TILE*3,h:56,c:'#4466aa',c2:'#3355aa'});
}

// ─── COLLISION ─────────────────────────────────────────────────────────────────
function solid(tx,ty){ const t=getT(tx,ty); return t===T_SOLID||t===T_WATER; }
function collides(px,py,r){
  const tx0=Math.floor((px-r)/TILE), tx1=Math.floor((px+r)/TILE);
  const ty0=Math.floor((py-r)/TILE), ty1=Math.floor((py+r)/TILE);
  for(let ty=ty0;ty<=ty1;ty++) for(let tx=tx0;tx<=tx1;tx++)
    if(solid(tx,ty)){
      if(px+r>tx*TILE&&px-r<(tx+1)*TILE&&py+r>ty*TILE&&py-r<(ty+1)*TILE) return true;
    }
  return false;
}

// ─── DRAWING HELPERS ───────────────────────────────────────────────────────────
const canvas=document.getElementById('game');
const ctx2=canvas.getContext('2d');
ctx2.imageSmoothingEnabled=false;
const assets={};

function loadImg(key,src){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{ assets[key]=img; res(); };
    img.onerror=()=>res();
    img.src=src;
  });
}

function drawTile(tx,ty){
  const t=getT(tx,ty), x=tx*TILE, y=ty*TILE, even=(tx+ty)%2===0;
  switch(t){
    case T_GRASS:  ctx2.fillStyle=even?PAL.grass:PAL.grassD; ctx2.fillRect(x,y,TILE,TILE); break;
    case T_PATH:   ctx2.fillStyle=even?PAL.path:PAL.pathD;   ctx2.fillRect(x,y,TILE,TILE); break;
    case T_PLAZA:  ctx2.fillStyle=even?PAL.plaza:PAL.plazaD; ctx2.fillRect(x,y,TILE,TILE); break;
    case T_WATER:
      ctx2.fillStyle=PAL.water; ctx2.fillRect(x,y,TILE,TILE);
      if((tx+ty)%3===0){ ctx2.fillStyle=PAL.waterL; ctx2.fillRect(x+4,y+8,7,2); ctx2.fillRect(x+18,y+22,5,2); }
      break;
    default: // T_SOLID - not drawn as tile
      ctx2.fillStyle=even?PAL.grass:PAL.grassD; ctx2.fillRect(x,y,TILE,TILE);
  }
}

function drawDecor(d){
  if(d.type==='building'){
    // Shadow

// ─── ENTITIES ──────────────────────────────────────────────────────────────────
class Player{
  constructor(x,y){ this.x=x; this.y=y; this.facing='down'; this.moving=false; this.walkPhase=0; this.stepT=0; }
  update(dt){
    let dx=0,dy=0;
    if(keys['arrowleft']||keys['a']) dx-=1;
    if(keys['arrowright']||keys['d']) dx+=1;
    if(keys['arrowup']||keys['w']) dy-=1;
    if(keys['arrowdown']||keys['s']) dy+=1;
    this.moving=dx!==0||dy!==0;
    if(this.moving){
      const len=Math.sqrt(dx*dx+dy*dy); dx/=len; dy/=len;
      const spd=120*dt;
      const nx=this.x+dx*spd, ny=this.y+dy*spd;
      if(mode3D||!collides(nx,this.y,13)) this.x=nx;
      if(mode3D||!collides(this.x,ny,13)) this.y=ny;
      this.x=Math.max(16,Math.min(WPX-16,this.x));
      this.y=Math.max(16,Math.min(HPX-16,this.y));
      if(Math.abs(dx)>Math.abs(dy)) this.facing=dx>0?'right':'left';
      else this.facing=dy>0?'down':'up';
      this.walkPhase+=dt*9;
      this.stepT+=dt;
      if(this.stepT>0.28){ this.stepT=0; Aud.sfx.step(); }
    }
  }
}

class TeamMember{
  constructor(id,x,y,name,color,imgKey){
    this.id=id; this.x=x; this.y=y; this.name=name; this.color=color; this.imgKey=imgKey;
    this.joined=false; this.facing='down'; this.moving=false; this.walkPhase=0;
    this.tx=x; this.ty=y; this.idleTimer=Math.random()*3;
  }
  update(dt,leader){
    if(!this.joined){
      this.idleTimer-=dt;
      if(this.idleTimer<0){ this.idleTimer=2+Math.random()*3; const a=Math.random()*Math.PI*2,d=20+Math.random()*60; this.tx=Math.max(32,Math.min(WPX-32,this.x+Math.cos(a)*d)); this.ty=Math.max(32,Math.min(HPX-32,this.y+Math.sin(a)*d)); }
    } else {
      const dx=leader.x-this.x, dy=leader.y-this.y, dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>44){ this.tx=leader.x-(dx/dist)*38; this.ty=leader.y-(dy/dist)*38; }
    }
    const dx=this.tx-this.x, dy=this.ty-this.y, dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>6){
      const spd=Math.min(125*dt,dist); const mx=(dx/dist)*spd, my=(dy/dist)*spd;
      this.x+=mx;
      this.y+=my;
      this.x=Math.max(16,Math.min(WPX-16,this.x)); this.y=Math.max(16,Math.min(HPX-16,this.y));
      if(Math.abs(dx)>Math.abs(dy)) this.facing=dx>0?'right':'left'; else this.facing=dy>0?'down':'up';
      this.moving=true; this.walkPhase+=dt*8;
    } else this.moving=false;
  }
}

class Animal{
  constructor(type,x,y){
    this.type=type; this.x=x; this.y=y; this.tx=x; this.ty=y;
    this.spd=30+Math.random()*30; this.phase=Math.random()*Math.PI*2;
    this.facing='down'; this.idle=true; this.timer=Math.random()*3; this.walkPhase=0;
  }
  update(dt){
    this.timer-=dt; this.phase+=dt;
    if(this.timer<0){
      this.idle=!this.idle;
      if(!this.idle){ const a=Math.random()*Math.PI*2,d=30+Math.random()*90; this.tx=Math.max(TILE,Math.min((WORLD_W-1)*TILE,this.x+Math.cos(a)*d)); this.ty=Math.max(TILE,Math.min((WORLD_H-1)*TILE,this.y+Math.sin(a)*d)); this.timer=1.5+Math.random()*2.5; }
      else this.timer=0.8+Math.random()*2;
    }
    if(!this.idle){
      const dx=this.tx-this.x, dy=this.ty-this.y, dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>5){
        const spd=Math.min(this.spd*dt,dist);
        const mx=(dx/dist)*spd, my=(dy/dist)*spd;
        if(!collides(this.x+mx,this.y,10)) this.x+=mx; else this.idle=true;
        if(!collides(this.x,this.y+my,10)) this.y+=my; else this.idle=true;
        this.x=Math.max(TILE,Math.min((WORLD_W-1)*TILE,this.x));
        this.y=Math.max(TILE,Math.min((WORLD_H-1)*TILE,this.y));
        if(Math.abs(dx)>Math.abs(dy)) this.facing=dx>0?'right':'left'; else this.facing=dy>0?'down':'up';
        this.walkPhase+=dt*7;
      } else this.idle=true;
    }
  }
}

let player, teamMembers, animals, statuePos;

function initEntities(){
  // Park center (block 1,1: x=22-38,y=22-38 → center ~30,30)
  const px=30*TILE, py=30*TILE;
  player=new Player(px+64, py+48);
  statuePos={x:px, y:py};
  teamMembers=[
    new TeamMember('zombie',  19*TILE+16, 25*TILE, 'Zombie',  '#5599ff', 'zombie'),
    new TeamMember('lobster', 45*TILE,    17*TILE, 'Lobster', '#ff88cc', 'lobster'),
    new TeamMember('durian',  65*TILE,    30*TILE, 'Durian',  '#ddcc00', 'durian'),
  ];
  animals=[];
  const walkers=['man','woman','kid','wheelchair','pig','cow','cat','dog','sheep','monkey','elephant'];
  walkers.forEach(t=>{
    for(let rep=0;rep<(t==='man'||t==='woman'||t==='kid'?3:1);rep++){
      let x,y,tries=0;
      do{ x=(2+Math.floor(Math.random()*(WORLD_W-4)))*TILE; y=(2+Math.floor(Math.random()*(WORLD_H-4)))*TILE; tries++; }
      while(tries<40&&(collides(x,y,16)||Math.hypot(x-px,y-py)<96));
      if(tries<40) animals.push(new Animal(t,x,y));
    }
  });
}

// ─── DRAWING ───────────────────────────────────────────────────────────────────
function shadow(x,y,rx=16,ry=5){
  ctx2.fillStyle=PAL.shadow; ctx2.beginPath(); ctx2.ellipse(x,y,rx,ry,0,0,Math.PI*2); ctx2.fill();
}

function drawSprite(entity, imgKey, fallColor, size=SPRITE){
  const bob=entity.moving?Math.sin(entity.walkPhase)*2.5:Math.sin(Date.now()/1200)*0.8;
  shadow(entity.x, entity.y+4, size*0.32, size*0.12);
  const img=assets[imgKey];
  ctx2.save();
  ctx2.translate(entity.x, entity.y+bob);
  if(entity.facing==='left') ctx2.scale(-1,1);
  if(img){
    ctx2.drawImage(img,-size/2,-size*0.85,size,size);
  } else {
    ctx2.fillStyle=fallColor;
    ctx2.fillRect(-size/2,-size*0.85,size,size);
  }
  ctx2.restore();
}

function drawAnimalEntity(a){
  const fn=ANIMAL_DRAW[a.type]; if(!fn) return;
  const bob=!a.idle?Math.sin(a.walkPhase)*2:Math.sin(a.phase*1.5)*0.6;
  shadow(a.x,a.y+4,12,4);
  ctx2.save();
  ctx2.translate(a.x,a.y-14+bob);
  if(a.facing==='left') ctx2.scale(-1,1);
  fn(ctx2);
  ctx2.restore();
  // name tag
  const name=a.type[0].toUpperCase()+a.type.slice(1);
  ctx2.font='9px monospace'; ctx2.textAlign='center';
  const tw=ctx2.measureText(name).width+8;
  ctx2.fillStyle='rgba(0,0,0,0.5)'; ctx2.fillRect(a.x-tw/2,a.y-40,tw,13);
  ctx2.fillStyle='#ddd'; ctx2.fillText(name,a.x,a.y-30);
}

function drawStatue(){
  const {x,y}=statuePos;
  shadow(x,y+8,32,10);
  const img=assets['statue'];
  if(img){
    ctx2.drawImage(img,x-40,y-90,80,100);
  } else {
    // Fallback stone statue
    ctx2.fillStyle='#888'; ctx2.fillRect(x-18,y-80,36,85);
    ctx2.fillStyle='#999'; ctx2.fillRect(x-22,y-90,44,14);
    ctx2.fillStyle='#777'; ctx2.fillRect(x-26,y-10,52,16);
    ctx2.fillStyle='#aaa'; ctx2.font='bold 11px monospace'; ctx2.textAlign='center'; ctx2.fillText('GGUF',x,y-42);

// ─── INTERACT ──────────────────────────────────────────────────────────────────
const INTERACT_R=70;
function findTarget(){
  const {x:px,y:py}=player;
  if(Math.hypot(statuePos.x-px,statuePos.y-py)<INTERACT_R+24) return {type:'statue'};
  for(const m of teamMembers)
    if(!m.joined&&Math.hypot(m.x-px,m.y-py)<INTERACT_R) return {type:'recruit',member:m};
  return null;
}

function doInteract(){
  if(!interactTarget) return;
  if(interactTarget.type==='statue'){ openDialog(); }
  else if(interactTarget.type==='recruit'){
    interactTarget.member.joined=true;
    Aud.sfx.recruit();
    updateTeamHUD();
    setHint(`${interactTarget.member.name} joined your team!`,3000);
  }
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

async function sendMsg(){
  const textEl=document.getElementById('dialog-text');
  const sendBtn=document.getElementById('dialog-send');
  const text=textEl.value.trim();
  if(!text&&!selectedImage) return;
  sendBtn.disabled=true;
  Aud.sfx.send();
  const hist=document.getElementById('dialog-history');

  // User bubble
  const uDiv=document.createElement('div'); uDiv.className='msg-user';
  uDiv.innerHTML=`<div class="msg-label">You</div>${esc(text)}${selectedImage?' <em>[image attached]</em>':''}`;
  hist.appendChild(uDiv);

  // Build API message content
  let userContent;
  if(selectedImage){
    userContent=[{type:'text',text:text||'Please describe this image.'},{type:'image_url',image_url:{url:selectedImage.dataUrl}}];
  } else {
    userContent=text;
  }
  dialogHistory.push({role:'user',content:userContent});

  textEl.value=''; clearImage();
  hist.scrollTop=hist.scrollHeight;

  // Thinking indicator
  const aiDiv=document.createElement('div'); aiDiv.className='msg-ai';
  aiDiv.innerHTML='<div class="msg-label">GGUF Oracle</div><em>Consulting the ancient knowledge...</em>';
  hist.appendChild(aiDiv); hist.scrollTop=hist.scrollHeight;

  try{
    const res=await fetch(cfg.endpoint,{
      method:'POST',
      headers:{'Content-Type':'application/json',...(cfg.apiKey?{Authorization:`Bearer ${cfg.apiKey}`}:{})},
      body:JSON.stringify({
        model:cfg.model,
        messages:[
          {role:'system',content:'You are the GGUF Oracle, a wise ancient stone statue in a cozy animal village. Speak in a warm, slightly mystical tone. Be concise (2-3 sentences). When analyzing images, describe what you see in a playful village-oracle style.'},
          ...dialogHistory
        ],
        max_tokens:350,stream:false
      })
    });
    if(!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    const data=await res.json();
    const reply=data.choices?.[0]?.message?.content||'The Oracle remains silent...';
    dialogHistory.push({role:'assistant',content:reply});
    aiDiv.innerHTML=`<div class="msg-label">GGUF Oracle</div>${esc(reply)}`;
    Aud.sfx.recv();
  } catch(e){
    aiDiv.className='msg-err';
    aiDiv.innerHTML=`<div class="msg-label">Error</div>${esc(e.message)}`;
  }
  hist.scrollTop=hist.scrollHeight;
  sendBtn.disabled=false;
}

    m.position.set(x,y,z); m.scale.y=scaleY; m.castShadow=m.receiveShadow=true; g.add(m); return m;
  }
  function addEye(g,x,y,z){
    const e=new THREE.Mesh(new THREE.SphereGeometry(.045,6,4),mat('#111111'));
    e.position.set(x,y,z); e.castShadow=true; g.add(e); return e;
  }
  function makeConnectorModel(){
    const g=new THREE.Group();
    addSphere(g,.5,'#4ee05c',0,.58,0,.92);
    addSphere(g,.22,'#8dff95',0,.98,.06,.8);
    addEye(g,-.16,.67,.42); addEye(g,.16,.67,.42);
    addBox(g,-.38,.05,.12,.12,.42,'#225522',.12);
    addBox(g,.38,.05,.12,.12,.42,'#225522',.12);
    addBox(g,-.16,.5,.08,.08,.34,'#d7ffd7',1.02);
    addBox(g,.16,.5,.08,.08,.34,'#d7ffd7',1.02);
    return g;
  }
  function makeZombieModel(){
    const g=new THREE.Group();
    addSphere(g,.48,'#6da1ff',0,.58,0,.96);
    addSphere(g,.25,'#9fc2ff',0,.98,.05,.82);
    addEye(g,-.15,.67,.42); addEye(g,.15,.67,.42);
    addBox(g,-.42,.03,.12,.12,.5,'#4568b8',.12);
    addBox(g,.42,.03,.12,.12,.5,'#4568b8',.12);
    addBox(g,0,.46,.34,.05,.05,'#223366',.76);
    return g;
  }
  function makeLobsterModel(){
    const g=new THREE.Group();
    addSphere(g,.46,'#ff5c9d',0,.5,0,.75);
    addSphere(g,.28,'#ff88bb',0,.86,.1,.85);
    addEye(g,-.12,.94,.35); addEye(g,.12,.94,.35);
    addBox(g,-.58,.12,.18,.18,.18,'#ff77aa',.45);
    addBox(g,.58,.12,.18,.18,.18,'#ff77aa',.45);
    addSphere(g,.18,'#ff3f85',-.82,.58,.16,.75);
    addSphere(g,.18,'#ff3f85',.82,.58,.16,.75);
    return g;
  }
  function makeDurianModel(){
    const g=new THREE.Group();
    addSphere(g,.5,'#d9ca2f',0,.58,0,.95);
    for(let i=0;i<10;i++){
      const a=i/10*Math.PI*2;
      const spike=new THREE.Mesh(new THREE.ConeGeometry(.09,.32,5),mat('#f3e75a'));
      spike.position.set(Math.cos(a)*.48,.66,Math.sin(a)*.48);
      spike.rotation.z=-Math.cos(a)*.7; spike.rotation.x=Math.sin(a)*.7;
      spike.castShadow=true; g.add(spike);
    }
    addEye(g,-.15,.67,.43); addEye(g,.15,.67,.43);
    addBox(g,0,.47,.28,.05,.05,'#6b6018',.76);
    return g;
  }
  function makeStatueModel(){
    const g=new THREE.Group();
    addBox(g,0,0,.95,.95,.24,'#686878',.02);
    addSphere(g,.55,'#9a9aaa',0,.78,0,.9);
    addSphere(g,.24,'#b6b6c6',0,1.18,.04,.8);
    addEye(g,-.13,1.24,.24); addEye(g,.13,1.24,.24);
    addBox(g,0,.27,.5,.08,.08,'#d2d2e0',1.02);
    addBox(g,0,.38,.62,.1,.08,'#7e7e90',.24);
    return g;
  }
  function makeCharacterModel(id){
    if(id==='connector') return makeConnectorModel();
    if(id==='zombie') return makeZombieModel();
    if(id==='lobster') return makeLobsterModel();
    if(id==='durian') return makeDurianModel();
    if(id==='statue') return makeStatueModel();
    return makeConnectorModel();
  }
  function addCharacter3D(id,obj,scale=1){
    const g=makeCharacterModel(id);
    const bob=obj.moving?Math.sin(obj.walkPhase)*.08:Math.sin(Date.now()/500)*.025;
    g.position.set(wx(obj.x),bob,wz(obj.y));
    g.rotation.y=faceAngle(obj);
    g.scale.setScalar(scale);
    entityGroup.add(g);
    return g;
  }
  function updateEntities(){
    if(!ready) return;
    clearGroup(entityGroup);
    addCharacter3D('statue',statuePos,1.6);
    for(const a of animals){
      const s=new THREE.Sprite(animalMat(a.type));
      s.scale.set(1.65,1.65,1); s.position.set(wx(a.x),.92,wz(a.y)); s.renderOrder=12; entityGroup.add(s);
    }
    for(const m of teamMembers){
      addCharacter3D(m.id,m,1);
    }
    addCharacter3D('connector',player,1.08);
  }
  function updateEditor(){
    clearGroup(editorGroup);
    if(!editorMode) return;
    if(editorMouseTx>=0&&editorMouseTy>=0){
      const item=PALETTE.find(p=>p.id===editorTool), col=item?item.color:'#ffffff';
      addBox(editorGroup,editorMouseTx-HALF_W+.5,editorMouseTy-HALF_H+.5,.96,.96,.08,col,.08);
    }
  }
  function render(){
    if(!ready) return;
    if(threeDirty) rebuild();
    updateEntities();
    updateEditor();
    const focusX=editorMode?cam.x+canvas.width/2:player.x;
    const focusY=editorMode?cam.y+canvas.height/2:player.y;
    const tx=wx(focusX), tz=wz(focusY);
    const target=new THREE.Vector3(tx,0,tz);
    camera.position.lerp(new THREE.Vector3(tx-7,11,tz+10),.12);
    camera.lookAt(target.x,0,target.z);
    renderer.render(scene,camera);
  }
  function setActive(on){
    if(on&&!init()) return false;
    if(renderer) renderer.domElement.classList.toggle('hidden',!on);
    canvas.classList.toggle('hidden',on);
    return true;
  }
  function resize(){
    if(!ready) return;
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
  }
  function tileFromClient(clientX,clientY){
    if(!ready) return null;
    const r=renderer.domElement.getBoundingClientRect();
    mouse.x=((clientX-r.left)/r.width)*2-1;
    mouse.y=-((clientY-r.top)/r.height)*2+1;
    raycaster.setFromCamera(mouse,camera);
    if(!raycaster.ray.intersectPlane(groundPlane,tmpV)) return null;
    return {tx:Math.floor(tmpV.x+HALF_W),ty:Math.floor(tmpV.z+HALF_H)};
  }
  return {init,rebuild,render,setActive,resize,tileFromClient,markDirty(){threeDirty=true;}};
})();

// ─── RENDER ────────────────────────────────────────────────────────────────────
function resizeCanvas(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; ctx2.imageSmoothingEnabled=false; }

function updateCam(){
  cam.x=player.x-canvas.width/2; cam.y=player.y-canvas.height/2;
  cam.x=Math.max(0,Math.min(WPX-canvas.width,cam.x));
  cam.y=Math.max(0,Math.min(HPX-canvas.height,cam.y));
}

function render(){
  ctx2.clearRect(0,0,canvas.width,canvas.height);
  ctx2.save(); ctx2.translate(-cam.x,-cam.y);

  const tx0=Math.max(0,Math.floor(cam.x/TILE)), ty0=Math.max(0,Math.floor(cam.y/TILE));
  const tx1=Math.min(WORLD_W-1,Math.ceil((cam.x+canvas.width)/TILE));
  const ty1=Math.min(WORLD_H-1,Math.ceil((cam.y+canvas.height)/TILE));

  for(let ty=ty0;ty<=ty1;ty++) for(let tx=tx0;tx<=tx1;tx++) drawTile(tx,ty);

  // Flowers first (ground layer)
  const cx1=cam.x, cy1=cam.y, cx2=cam.x+canvas.width+40, cy2=cam.y+canvas.height+40;
  for(const d of decors) if((d.type==='flower'||d.type==='crosswalk')&&d.x>cx1-20&&d.x<cx2&&d.y>cy1-20&&d.y<cy2) drawDecor(d);

  // Collect renderables, sort by Y for painter's algorithm
  const R=[];
  for(const d of decors){
    if(d.type==='flower'||d.type==='crosswalk') continue;
    const dx=d.x,dy=d.y,dw=d.w||TILE,dh=d.h||TILE;
    if(dx+dw<cx1||dx>cx2||dy+dh<cy1||dy>cy2) continue;
    const sortY=d.h?dy+d.h:dy+TILE;
    R.push({sortY,draw:()=>drawDecor(d)});
  }
  for(const a of animals){
    if(Math.abs(a.x-player.x)>canvas.width/2+60||Math.abs(a.y-player.y)>canvas.height/2+60) continue;
    R.push({sortY:a.y+4,draw:()=>drawAnimalEntity(a)});
  }
  // Statue
  R.push({sortY:statuePos.y+8,draw:drawStatue});
  // Team members
  for(const m of teamMembers){
    const captured=m;
    R.push({sortY:m.y,draw:()=>{
      drawSprite(captured,captured.imgKey,captured.color);
      drawLabel(captured.x,captured.y,captured.name,captured.joined?captured.color:'#aaa');
      if(!captured.joined&&interactTarget&&interactTarget.type==='recruit'&&interactTarget.member===captured)
        drawInteractPrompt(captured.x,captured.y,`[E] Recruit ${captured.name}`);
    }});
  }
  // Player
  R.push({sortY:player.y,draw:()=>{
    drawSprite(player,'connector','#44cc44');
    drawLabel(player.x,player.y,'Connector','#66ee66');
  }});
  // Statue interact prompt
  if(interactTarget&&interactTarget.type==='statue'){
    R.push({sortY:statuePos.y-80,draw:()=>drawInteractPrompt(statuePos.x,statuePos.y+30,'[E] Talk to Oracle')});
  }

  R.sort((a,b)=>a.sortY-b.sortY);
  for(const r of R) r.draw();

  ctx2.restore();
}

// ─── GAME LOOP ─────────────────────────────────────────────────────────────────
let lastT=0;
function loop(ts){
  const dt=Math.min((ts-lastT)/1000,.05); lastT=ts;
  if(editorMode){
    const spd=220*dt;
    if(keys['a']||keys['arrowleft']) cam.x=Math.max(0,cam.x-spd);
    if(keys['d']||keys['arrowright']) cam.x=Math.min(WPX-canvas.width,cam.x+spd);
    if(keys['w']||keys['arrowup']) cam.y=Math.max(0,cam.y-spd);
    if(keys['s']||keys['arrowdown']) cam.y=Math.min(HPX-canvas.height,cam.y+spd);
  } else if(!dialogOpen){
    player.update(dt);
    updateCam();
    interactTarget=findTarget();
    let leader=player;
    for(const m of teamMembers){ m.update(dt,leader); if(m.joined) leader=m; }
    for(const a of animals) a.update(dt);
  }
  if(mode3D){
    ThreeView.render();
  } else {
    render();
    if(editorMode) renderEditorOverlay();
  }
  requestAnimationFrame(loop);
}

function buildPalette(){
  const container=document.getElementById('pal-items');
  let lastCat='';
  for(const item of PALETTE){
    if(item.cat!==lastCat){
      lastCat=item.cat;
      const sec=document.createElement('div'); sec.className='pal-section'; sec.textContent=item.cat;
      container.appendChild(sec);
    }
    const el=document.createElement('div');
    el.className='pal-item'+(item.id===editorTool?' active':'');
    el.dataset.tool=item.id;
    el.innerHTML=`<div class="pal-swatch" style="background:${item.color}"></div>${item.label}`;
    el.addEventListener('click',()=>selectTool(item.id));
    container.appendChild(el);
  }
}

function selectTool(id){
  editorTool=id;
  document.querySelectorAll('.pal-item').forEach(el=>el.classList.toggle('active',el.dataset.tool===id));
}

const TILE_IDS={grass:T_GRASS,path:T_PATH,plaza:T_PLAZA,water:T_WATER};
const TEAM_COLORS={zombie:'#5599ff',lobster:'#ff88cc',durian:'#ddcc00'};
const ANIMAL_TYPES=['pig','cow','cat','dog','sheep','monkey','elephant','man','woman','kid','wheelchair'];
const DECOR_TYPES=['tree','flower','building','car','truck','bus','traffic_light','fire_hydrant','culvert_cover','crosswalk'];

function editorPlace(tx,ty){
  if(tx<0||ty<0||tx>=WORLD_W||ty>=WORLD_H) return;
  const px=tx*TILE+TILE/2, py=ty*TILE+TILE/2;

  if(editorTool==='erase'){
    const t=getT(tx,ty);
    if(t!==T_WATER) setT(tx,ty,T_GRASS);
    for(let i=decors.length-1;i>=0;i--){
      const d=decors[i];
      if(d.type==='building'){
        const bx=Math.floor(d.x/TILE),by=Math.floor(d.y/TILE),bw=Math.round(d.w/TILE),bh=Math.round(d.h/TILE);
        if(tx>=bx&&tx<bx+bw&&ty>=by&&ty<by+bh){
          for(let yy=by;yy<by+bh;yy++) for(let xx=bx;xx<bx+bw;xx++) setT(xx,yy,T_GRASS);
          decors.splice(i,1);
        }
      } else if(Math.floor(d.x/TILE)===tx&&Math.floor(d.y/TILE)===ty){
          decors.splice(i,1);
          if(d.type==='tree') setT(tx,ty,T_GRASS);
        }
    }
    editorEnt.animals=editorEnt.animals.filter(a=>!(Math.floor(a.x/TILE)===tx&&Math.floor(a.y/TILE)===ty));
    editorEnt.teamMembers=editorEnt.teamMembers.filter(m=>!(Math.floor(m.x/TILE)===tx&&Math.floor(m.y/TILE)===ty));
    if(editorEnt.playerStart&&Math.floor(editorEnt.playerStart.x/TILE)===tx&&Math.floor(editorEnt.playerStart.y/TILE)===ty) editorEnt.playerStart=null;
    if(editorEnt.statuePos&&Math.floor(editorEnt.statuePos.x/TILE)===tx&&Math.floor(editorEnt.statuePos.y/TILE)===ty) editorEnt.statuePos=null;
    return;
  }

  if(TILE_IDS[editorTool]!==undefined){ setT(tx,ty,TILE_IDS[editorTool]); return; }

  if(editorTool==='tree'){
    if(getT(tx,ty)!==T_GRASS) return;
    decors.push({type:'tree',x:tx*TILE,y:ty*TILE});
    setT(tx,ty,T_SOLID);
    return;
  }
  if(editorTool==='flower'){
    const fc=['#ff6699','#ffcc44','#aa66ff','#ff99aa','#88ffbb','#ffaa55'];
    decors.push({type:'flower',x:px,y:py,c:fc[Math.floor(Math.random()*fc.length)]});
    return;
  }
  if(editorTool==='building'){
    const W=4,H=4;
    if(tx+W>WORLD_W||ty+H>WORLD_H) return;
    const roofs=['#b04030','#3060b0','#4a2870','#205080','#208060','#806020'];
    const walls=['#c8cce0','#d0d4e8','#e0dcd8','#d8e0d8','#dce8e0','#e8e4d0'];
    const ri=Math.floor(Math.random()*roofs.length);
    decors.push({type:'building',x:tx*TILE,y:ty*TILE,w:W*TILE,h:H*TILE,c:walls[ri],c2:roofs[ri]});
    for(let yy=ty;yy<ty+H;yy++) for(let xx=tx;xx<tx+W;xx++) setT(xx,yy,T_SOLID);
    return;
  }
  if(editorTool==='car'){
    const cp=[{c:'#cc3333',c2:'#aa2222'},{c:'#3355cc',c2:'#2244aa'},{c:'#338833',c2:'#226622'},{c:'#888',c2:'#666'},{c:'#cc8833',c2:'#aa6622'},{c:'#551177',c2:'#440055'}];
    const cc=cp[Math.floor(Math.random()*cp.length)];
    decors.push({type:'car',x:tx*TILE,y:ty*TILE,w:TILE*2,h:44,c:cc.c,c2:cc.c2});
    return;
  }
  if(editorTool==='truck'){
    const tc=[{c:'#4466aa',c2:'#3355aa'},{c:'#884422',c2:'#662211'},{c:'#448844',c2:'#336633'}];
    const cc=tc[Math.floor(Math.random()*tc.length)];
    decors.push({type:'truck',x:tx*TILE,y:ty*TILE,w:TILE*3,h:56,c:cc.c,c2:cc.c2});
    return;
  }
  if(editorTool==='bus'){
    decors.push({type:'bus',x:tx*TILE,y:ty*TILE,w:TILE*4,h:60,c:'#eecc00'});
    return;
  }
  if(editorTool==='traffic_light'){
    decors.push({type:'traffic_light',x:tx*TILE,y:ty*TILE,h:TILE*2});
    return;
  }
  if(editorTool==='fire_hydrant'){
    decors.push({type:'fire_hydrant',x:tx*TILE,y:ty*TILE,h:TILE});
    return;
  }
  if(editorTool==='culvert_cover'){
    decors.push({type:'culvert_cover',x:tx*TILE,y:ty*TILE,h:TILE});
    return;
  }
  if(editorTool==='crosswalk'){
    const hasLR=getT(tx-1,ty)===T_PATH||getT(tx+1,ty)===T_PATH;
    decors.push({type:'crosswalk',x:tx*TILE,y:ty*TILE,dir:hasLR?'v':'h'});
    return;
  }
  if(ANIMAL_TYPES.includes(editorTool)){ editorEnt.animals.push({type:editorTool,x:px,y:py}); return; }
  if(editorTool==='connector'){ editorEnt.playerStart={x:px,y:py}; return; }
  if(editorTool==='statue'){ editorEnt.statuePos={x:px,y:py}; return; }
  if(['zombie','lobster','durian'].includes(editorTool)){
    editorEnt.teamMembers=editorEnt.teamMembers.filter(m=>m.id!==editorTool);
    editorEnt.teamMembers.push({id:editorTool,x:px,y:py});
  }
}

function renderEditorOverlay(){
  ctx2.save(); ctx2.translate(-cam.x,-cam.y);

  // Entity markers
  function marker(x,y,col,label){
    ctx2.fillStyle=col+'99'; ctx2.beginPath(); ctx2.arc(x,y,18,0,Math.PI*2); ctx2.fill();
    ctx2.strokeStyle=col; ctx2.lineWidth=2; ctx2.beginPath(); ctx2.arc(x,y,18,0,Math.PI*2); ctx2.stroke();
    ctx2.fillStyle=col; ctx2.font='bold 8px monospace'; ctx2.textAlign='center'; ctx2.fillText(label,x,y+3);
  }
  if(editorEnt.playerStart) marker(editorEnt.playerStart.x,editorEnt.playerStart.y,'#44cc44','YOU');
  if(editorEnt.statuePos) marker(editorEnt.statuePos.x,editorEnt.statuePos.y,'#aaaacc','STAT');
  for(const m of editorEnt.teamMembers) marker(m.x,m.y,TEAM_COLORS[m.id]||'#fff',m.id.slice(0,3).toUpperCase());
  for(const a of editorEnt.animals){
    ctx2.fillStyle='rgba(255,255,180,0.35)'; ctx2.beginPath(); ctx2.arc(a.x,a.y,12,0,Math.PI*2); ctx2.fill();
    ctx2.fillStyle='#ffd'; ctx2.font='bold 8px monospace'; ctx2.textAlign='center'; ctx2.fillText(a.type[0].toUpperCase(),a.x,a.y+3);
  }

  // Hover highlight
  if(editorMouseTx>=0&&editorMouseTy>=0){
    const hx=editorMouseTx*TILE, hy=editorMouseTy*TILE;
    const item=PALETTE.find(p=>p.id===editorTool);
    if(item){ ctx2.fillStyle=item.color+'44'; ctx2.fillRect(hx,hy,TILE,TILE); }
    ctx2.strokeStyle='rgba(255,255,255,0.8)'; ctx2.lineWidth=1.5; ctx2.strokeRect(hx+1,hy+1,TILE-2,TILE-2);
  }
  ctx2.restore();

  const info=document.getElementById('editor-cursor-info');
  info.textContent=editorMouseTx>=0?`(${editorMouseTx}, ${editorMouseTy})`:'hover map to place';
}

function saveMapJSON(){
  const stamp=(()=>{
    const d=new Date(), pad=n=>String(n).padStart(2,'0');
    return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
  })();
  const data={
    version:1, worldW:WORLD_W, worldH:WORLD_H,
    tiles:Array.from(tiles),
    decors:decors.map(d=>({...d})),
    entities:{
      playerStart: editorEnt.playerStart||{x:CX*TILE+16,y:CY*TILE+16},
      statuePos:   editorEnt.statuePos||{x:CX*TILE,y:CY*TILE},
      teamMembers: editorEnt.teamMembers.length?editorEnt.teamMembers:[
        {id:'zombie',x:CX*TILE-110,y:CY*TILE+160},
        {id:'lobster',x:CX*TILE+210,y:CY*TILE-130},
        {id:'durian',x:CX*TILE-200,y:CY*TILE-170},
      ],
      animals: editorEnt.animals,
    }
  };
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download=`gguf-map-${stamp}.json`; a.click();
}

function applyMapJSON(data){
  if(!data.tiles||!data.decors){alert('Invalid map file');return;}
  for(let i=0;i<tiles.length;i++) tiles[i]=data.tiles[i]!==undefined?data.tiles[i]:T_GRASS;
  decors.length=0; for(const d of data.decors) decors.push({...d});
  if(data.entities){
    editorEnt.playerStart=data.entities.playerStart||null;
    editorEnt.statuePos=data.entities.statuePos||null;
    editorEnt.teamMembers=[...(data.entities.teamMembers||[])];
    editorEnt.animals=[...(data.entities.animals||[])];
  }
  ThreeView.markDirty();
}

function playEditorMap(){
  const ps=editorEnt.playerStart||{x:CX*TILE+16,y:CY*TILE+16};
  const sp=editorEnt.statuePos||{x:CX*TILE,y:CY*TILE};
  const tms=editorEnt.teamMembers.length?editorEnt.teamMembers:[
    {id:'zombie',x:CX*TILE-110,y:CY*TILE+160},
    {id:'lobster',x:CX*TILE+210,y:CY*TILE-130},
    {id:'durian',x:CX*TILE-200,y:CY*TILE-170},
  ];
  player=new Player(ps.x,ps.y);
  statuePos={x:sp.x,y:sp.y};
  teamMembers=tms.map(m=>new TeamMember(m.id,m.x,m.y,m.id[0].toUpperCase()+m.id.slice(1),TEAM_COLORS[m.id]||'#fff',m.id));
  animals=editorEnt.animals.map(a=>new Animal(a.type,a.x,a.y));
  editorMode=false;
  document.getElementById('editor-panel').classList.add('hidden');
  document.getElementById('editor-btn').classList.remove('active');
  updateTeamHUD();
  setHint(mode3D?'3D mode · WASD / Arrows · move  |  E · interact':'WASD / Arrows · move  |  E · interact');
  ThreeView.markDirty();
}

function setEditorMouseFromEvent(e){
  if(mode3D){
    const p=ThreeView.tileFromClient(e.clientX,e.clientY);
    editorMouseTx=p?p.tx:-1; editorMouseTy=p?p.ty:-1;
  } else {
    editorMouseTx=Math.floor((e.clientX+cam.x)/TILE);
    editorMouseTy=Math.floor((e.clientY+cam.y)/TILE);
  }
}

function setupEditorUI(){
  buildPalette();

  document.getElementById('editor-btn').addEventListener('click',()=>{
    editorMode=!editorMode;
    document.getElementById('editor-panel').classList.toggle('hidden',!editorMode);
    document.getElementById('editor-btn').classList.toggle('active',editorMode);
    document.getElementById('settings-panel').classList.add('hidden');
    if(editorMode){
      editorEnt.playerStart={x:player.x,y:player.y};
      editorEnt.statuePos={x:statuePos.x,y:statuePos.y};
      editorEnt.teamMembers=teamMembers.map(m=>({id:m.id,x:m.x,y:m.y}));
      editorEnt.animals=animals.map(a=>({type:a.type,x:a.x,y:a.y}));
      setHint('WASD · pan  |  Click · place  |  Right-click · erase');
    } else {
      setHint(mode3D?'3D mode · WASD / Arrows · move  |  E · interact':'WASD / Arrows · move  |  E · interact');
    }
  });

  canvas.addEventListener('mousemove',e=>{
    if(!editorMode) return;
    setEditorMouseFromEvent(e);
    if(editorMouseDown){ editorPlace(editorMouseTx,editorMouseTy); ThreeView.markDirty(); }
  });
  canvas.addEventListener('mousedown',e=>{
    if(!editorMode) return;
    setEditorMouseFromEvent(e);
    if(e.button===0){ editorMouseDown=true; editorPlace(editorMouseTx,editorMouseTy); ThreeView.markDirty(); }
    else if(e.button===2){ const prev=editorTool; editorTool='erase'; editorPlace(editorMouseTx,editorMouseTy); editorTool=prev; ThreeView.markDirty(); }
  });
  canvas.addEventListener('mouseup',()=>{ editorMouseDown=false; });
  canvas.addEventListener('mouseleave',()=>{ editorMouseDown=false; editorMouseTx=-1; editorMouseTy=-1; });
  canvas.addEventListener('contextmenu',e=>{ if(editorMode) e.preventDefault(); });
  window.addEventListener('mouseup',()=>{ editorMouseDown=false; });
  document.addEventListener('mousemove',e=>{
    if(!editorMode||!mode3D||e.target.closest('#ui')) return;
    setEditorMouseFromEvent(e);
    if(editorMouseDown){ editorPlace(editorMouseTx,editorMouseTy); ThreeView.markDirty(); }
  });
  document.addEventListener('mousedown',e=>{
    if(!editorMode||!mode3D||e.target.closest('#ui')) return;
    if(e.button===0){ editorMouseDown=true; setEditorMouseFromEvent(e); editorPlace(editorMouseTx,editorMouseTy); ThreeView.markDirty(); }
    else if(e.button===2){ setEditorMouseFromEvent(e); const prev=editorTool; editorTool='erase'; editorPlace(editorMouseTx,editorMouseTy); editorTool=prev; ThreeView.markDirty(); }
  });
  document.addEventListener('contextmenu',e=>{ if(editorMode&&mode3D&&!e.target.closest('#ui')) e.preventDefault(); });

  document.getElementById('editor-save').addEventListener('click',saveMapJSON);
  document.getElementById('editor-play').addEventListener('click',playEditorMap);
  document.getElementById('editor-clear').addEventListener('click',()=>{
    if(!confirm('Clear all tiles and objects?')) return;
    tiles.fill(T_GRASS); decors.length=0;
    editorEnt.playerStart=null; editorEnt.statuePos=null; editorEnt.teamMembers=[]; editorEnt.animals=[];
    ThreeView.markDirty();
  });
  document.getElementById('editor-load-input').addEventListener('change',e=>{
    const file=e.target.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=ev=>{ try{ applyMapJSON(JSON.parse(ev.target.result)); }catch(err){ alert('Failed: '+err.message); } };
    r.readAsText(file); e.target.value='';
  });
}

// ─── SETUP ─────────────────────────────────────────────────────────────────────
function setupInput(){
  window.addEventListener('keydown',e=>{
    const k=e.key.toLowerCase();
    if(!keys[k]) justPressed[k]=true;
    keys[k]=true;
    if(k==='e'&&!dialogOpen) doInteract();
    if(k==='escape'&&dialogOpen) closeDialog();
    if(!dialogOpen&&['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
  });
  window.addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });
}

function setupUI(){
  // Audio init on first interaction
  let audioStarted=false;
  function startAudio(){ if(audioStarted)return; audioStarted=true; Aud.init(); if(cfg.music) Aud.start(); }
  window.addEventListener('keydown',startAudio,{once:true});
  window.addEventListener('click',startAudio,{once:true});

  // Settings panel toggle
  document.getElementById('settings-btn').addEventListener('click',()=>{
    startAudio();
    document.getElementById('settings-panel').classList.toggle('hidden');
  });
  document.getElementById('mode-btn').addEventListener('click',()=>{
    mode3D=!mode3D;
    if(!ThreeView.setActive(mode3D)){
      mode3D=false;
      setHint('3D renderer unavailable. Check that Three.js loaded.',3000);
      return;
    }
    document.getElementById('mode-btn').classList.toggle('active',mode3D);
    document.getElementById('mode-btn').textContent=mode3D?'2D':'3D';
    ThreeView.markDirty();
    setHint(mode3D?'3D mode · WASD / Arrows · move  |  E · interact':'WASD / Arrows · move  |  E · interact',2500);
  });
  ['cfg-endpoint','cfg-apikey','cfg-model'].forEach(id=>document.getElementById(id).addEventListener('change',saveCfg));

  document.getElementById('toggle-music').addEventListener('click',()=>{
    cfg.music=!cfg.music; setToggle('toggle-music',cfg.music);
    if(cfg.music) Aud.start(); else Aud.stop();
    saveCfg();
  });
  document.getElementById('toggle-sfx').addEventListener('click',()=>{
    cfg.sfx=!cfg.sfx; setToggle('toggle-sfx',cfg.sfx); saveCfg();
  });

  // Dialog
  document.getElementById('dialog-close').addEventListener('click',closeDialog);
  document.getElementById('dialog-send').addEventListener('click',sendMsg);
  document.getElementById('dialog-text').addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMsg(); } });

  // Image
  document.getElementById('dialog-image-btn').addEventListener('click',()=>document.getElementById('file-input').click());
  document.getElementById('file-input').addEventListener('change',e=>handleFile(e.target.files[0]));
  document.getElementById('img-clear').addEventListener('click',clearImage);

  // Drag-drop image onto dialog
  document.getElementById('dialog-box').addEventListener('dragover',e=>e.preventDefault());
  document.getElementById('dialog-box').addEventListener('drop',e=>{ e.preventDefault(); handleFile(e.dataTransfer.files[0]); });
}

async function init(){
  resizeCanvas();
  window.addEventListener('resize',()=>{ resizeCanvas(); ThreeView.resize(); });
  await Promise.all([
    loadImg('connector','character1-connector.png'),
    loadImg('zombie','character2-zombie.png'),
    loadImg('lobster','character3-lobster.png'),
    loadImg('durian','character4-durian.png'),
    loadImg('statue','gguf-statue.png'),
  ]);
  buildWorld();
  initEntities();
  loadCfg();
  setupInput();
  setupUI();
  setupEditorUI();
  updateTeamHUD();
  setHint('WASD / Arrows · move  |  E · interact');
  lastT=performance.now();
  requestAnimationFrame(loop);
}

init();
</script>
